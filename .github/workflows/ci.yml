name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  FEATURES: "api,telegram,discord,whatsapp,feishu,twilio,wecom,wecom-bot"
  SKILL_CRATES: "-p news_fetch -p deep-search -p deep-crawl -p send-email -p account-manager -p voice -p clock -p weather -p pipeline-guard -p skill-evolve"

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Dashboard typecheck
        working-directory: dashboard
        run: npm run typecheck

      - name: Dashboard build
        working-directory: dashboard
        run: npm run build

      # Ephemeral bundle policy: crates/octos-cli/static/admin/ is gitignored
      # and rebuilt by scripts/build-dashboard.sh, CI release jobs, and any
      # source-clone build. We verify the build script runs cleanly; we do
      # not diff a committed bundle against rebuilt output (there is no
      # committed bundle by policy). See the note in .gitignore.
      - name: Verify dashboard build script runs cleanly
        run: ./scripts/build-dashboard.sh

  swarm-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: swarm-app/package-lock.json

      - name: Install swarm-app deps
        working-directory: swarm-app
        run: npm ci

      - name: Swarm-app typecheck
        working-directory: swarm-app
        run: npm run typecheck

      - name: Swarm-app build
        working-directory: swarm-app
        run: npm run build

      - name: Swarm-app unit tests
        working-directory: swarm-app
        run: npx vitest run

      - name: Verify embedded swarm-app assets are up to date
        run: |
          ./scripts/build-swarm-app.sh
          if [ -n "$(git status --porcelain -- crates/octos-cli/static/swarm)" ]; then
            echo "Embedded swarm-app assets are out of date. Run ./scripts/build-swarm-app.sh and commit changes."
            git status --short -- crates/octos-cli/static/swarm
            exit 1
          fi

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.33.1

  check:
    runs-on: ubuntu-latest
    env:
      # Defense-in-depth OOM caps. Even after sharding the heaviest crates
      # (octos-agent, octos-cli) into dedicated jobs (#672), the lean `check`
      # job still compiles the full workspace for clippy + light-crate tests,
      # so we keep the same caps that PR #672's prior commit established:
      #
      # 1. CARGO_BUILD_JOBS=1 — serialize rustc/linker invocations so two
      #    peaks never overlap on the 16GB ubuntu-latest runner.
      #
      # 2. CARGO_PROFILE_{TEST,DEV}_DEBUG=line-tables-only — drop full DWARF
      #    (debug=2) to file/line only, shrinking each linker invocation's
      #    peak RSS while preserving panic-backtrace usefulness.
      #
      # The actual OOM that JOBS=1 + line-tables-only could not fix was
      # memory accumulation across N sequential heavy-crate test steps in
      # the same runner (run 25137059453, job 73677952504 — runner lost
      # communication with the server during `Test octos-agent (lib)`,
      # 54min in). The structural fix is sharding: see test-octos-agent
      # (matrix: lib + integration) and test-octos-cli below, which each
      # get their own fresh 16GB runner. This `check` job now only handles
      # the light crates and workspace-level checks (fmt, clippy, doc tests).
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # ── Light-crate tests ───────────────────────────────────────────────────
      # The two heavy crates (octos-agent, octos-cli) live in their own
      # dedicated jobs (test-octos-agent, test-octos-cli) so each gets a
      # fresh 16GB runner — see #672. This `check` job runs the remaining
      # crates plus workspace-level checks.

      # Foundation crates (no internal deps, lib-only)
      - name: Test octos-core
        run: cargo test -p octos-core

      - name: Test octos-memory
        run: cargo test -p octos-memory

      # Mid-tier libs + their integration tests
      - name: Test octos-llm (lib)
        run: cargo test -p octos-llm --lib

      - name: Test octos-llm (integration)
        run: cargo test -p octos-llm --tests

      - name: Test octos-bus
        run: cargo test -p octos-bus

      - name: Test octos-pipeline
        run: cargo test -p octos-pipeline

      - name: Test octos-plugin
        run: cargo test -p octos-plugin

      - name: Test octos-swarm
        run: cargo test -p octos-swarm

      # Bundled harness starter skills (each has small lib + 1 smoke test)
      - name: Test harness starter skills
        run: |
          cargo test -p harness-starter-generic
          cargo test -p harness-starter-report
          cargo test -p harness-starter-audio
          cargo test -p harness-starter-coding

      # Doc tests — preserved from the prior `cargo test --workspace` coverage
      - name: Doc tests
        run: cargo test --workspace --doc

      # ── Targeted regression filters that fit on the lean runner ─────────────
      # The octos-llm-only regressions stay here (octos-llm already builds
      # in this job for `Test octos-llm`). The octos-cli regressions and
      # octos-agent regression test moved to their respective sharded jobs.
      - name: QoS adaptive/runtime catalog regressions (octos-llm)
        run: |
          cargo test -p octos-llm test_qos_ranking_changes_lane_selection -- --nocapture
          cargo test -p octos-llm test_derive_cold_start_catalog_assigns_non_zero_scores -- --nocapture
          cargo test -p octos-llm test_compatible_fallbacks_prefers_lower_seeded_qos_score -- --nocapture

  # ── Sharded heavy-crate test jobs ────────────────────────────────────────
  # These crates each pull in a >100MB rlib closure (chromiumoxide, lettre,
  # hyper, …) and link 27+ test binaries. Running them sequentially in the
  # `check` job exhausted the 16GB ubuntu-latest runner mid-link (run
  # 25137059453 — "hosted runner lost communication with the server" 54min
  # in). Each crate now runs on its own fresh runner with its own cache.
  #
  # octos-agent goes one step further: its lib + integration test compile
  # phases EACH peak around the 16GB ceiling (run on PR #672 — integration
  # step was cancelled after lib step's compile already used a chunk of
  # RAM in the same runner). So lib and integration are split into two
  # SEPARATE jobs (each fresh 16GB runner), via a matrix on `test-mode`.
  #
  # Cache keys are distinct (shared-key: octos-agent-tests-{lib,integration}
  # / octos-cli-tests) so they don't fight the lean `check` job's
  # default-keyed cache and don't fight each other.

  test-octos-agent:
    strategy:
      fail-fast: false
      matrix:
        # `lib` runs `--lib` only. `integration` runs `--tests` (every
        # integration test binary, including activate_tools_regression).
        # Splitting these onto separate runners means each gets a fresh
        # 16GB allocation and neither inherits residual RAM from the
        # other's compile phase.
        test-mode: [lib, integration]
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: octos-agent-tests-${{ matrix.test-mode }}

      - name: Test octos-agent (lib)
        if: matrix.test-mode == 'lib'
        run: cargo test -p octos-agent --lib

      - name: Test octos-agent (integration)
        if: matrix.test-mode == 'integration'
        run: cargo test -p octos-agent --tests

      # Co-located in the integration job so it reuses the warm octos-agent
      # integration test build cache (activate_tools_regression is itself an
      # integration test binary). Skipped in the lib job.
      - name: activate_tools regression tests
        if: matrix.test-mode == 'integration'
        run: cargo test -p octos-agent --test activate_tools_regression -- --nocapture

  test-octos-cli:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: octos-cli-tests

      - name: Test octos-cli (lib)
        run: cargo test -p octos-cli --lib

      - name: Test octos-cli (integration)
        run: cargo test -p octos-cli --tests

      # Co-located here so they reuse this job's warm octos-cli build cache.
      - name: API feature tests
        run: cargo test -p octos-cli --features api api::auth_handlers

      - name: gateway_runtime regression (octos-cli)
        run: cargo test -p octos-cli gateway_runtime::tests --features api -- --nocapture

  # Lightweight check that exercises the `matrix` feature gate. The default
  # `FEATURES` env above intentionally omits `matrix` to keep the main `check`
  # job lean, but the Dockerfile and several release configurations enable it.
  # Without this job, feature-gated compile errors (e.g. an identifier referenced
  # only inside `#[cfg(feature = "matrix")]`) slip past PR CI and only surface
  # during docker builds. Keep this job intentionally tiny: `cargo check` only,
  # no tests, no clippy — its sole job is to catch the feature-gated compile.
  check-matrix:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: matrix-feature

      - name: Check octos-cli with matrix feature
        run: cargo check -p octos-cli --no-default-features --features api,telegram,discord,slack,whatsapp,feishu,email,matrix

  check-arm:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    env:
      CARGO_BUILD_JOBS: "2"  # Limit parallelism to avoid OOM on 16GB ARM runners
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: arm64

      - name: Build (workspace + all features)
        run: |
          cargo build --workspace
          cargo build -p octos-cli --features ${{ env.FEATURES }}

      - name: Build test binaries
        run: cargo test --workspace --no-run

      # Sharded per-crate tests — same rationale as the `check` job.
      - name: Test octos-core
        run: cargo test -p octos-core
      - name: Test octos-memory
        run: cargo test -p octos-memory
      - name: Test octos-llm (lib)
        run: cargo test -p octos-llm --lib
      - name: Test octos-llm (integration)
        run: cargo test -p octos-llm --tests
      - name: Test octos-bus
        run: cargo test -p octos-bus
      - name: Test octos-pipeline
        run: cargo test -p octos-pipeline
      - name: Test octos-plugin
        run: cargo test -p octos-plugin
      - name: Test octos-swarm
        run: cargo test -p octos-swarm
      - name: Test octos-agent (lib)
        run: cargo test -p octos-agent --lib
      - name: Test octos-agent (integration)
        run: cargo test -p octos-agent --tests
      - name: Test octos-cli (lib)
        run: cargo test -p octos-cli --lib
      - name: Test octos-cli (integration)
        run: cargo test -p octos-cli --tests
      - name: Test harness starter skills
        run: |
          cargo test -p harness-starter-generic
          cargo test -p harness-starter-report
          cargo test -p harness-starter-audio
          cargo test -p harness-starter-coding
      - name: Doc tests
        run: cargo test --workspace --doc

  check-riscv:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-riscv
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: riscv64

      - name: Build (workspace + all features)
        run: |
          cargo build --workspace
          cargo build -p octos-cli --features ${{ env.FEATURES }}

      - name: Build test binaries
        run: cargo test --workspace --no-run

      # Sharded per-crate tests — same rationale as the `check` job.
      - name: Test octos-core
        run: cargo test -p octos-core
      - name: Test octos-memory
        run: cargo test -p octos-memory
      - name: Test octos-llm (lib)
        run: cargo test -p octos-llm --lib
      - name: Test octos-llm (integration)
        run: cargo test -p octos-llm --tests
      - name: Test octos-bus
        run: cargo test -p octos-bus
      - name: Test octos-pipeline
        run: cargo test -p octos-pipeline
      - name: Test octos-plugin
        run: cargo test -p octos-plugin
      - name: Test octos-swarm
        run: cargo test -p octos-swarm
      - name: Test octos-agent (lib)
        run: cargo test -p octos-agent --lib
      - name: Test octos-agent (integration)
        run: cargo test -p octos-agent --tests
      - name: Test octos-cli (lib)
        run: cargo test -p octos-cli --lib
      - name: Test octos-cli (integration)
        run: cargo test -p octos-cli --tests
      - name: Test harness starter skills
        run: |
          cargo test -p harness-starter-generic
          cargo test -p harness-starter-report
          cargo test -p harness-starter-audio
          cargo test -p harness-starter-coding
      - name: Doc tests
        run: cargo test --workspace --doc

  check-windows:
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows

      - name: Build (workspace + all features)
        run: |
          cargo build --workspace
          cargo build -p octos-cli --features ${{ env.FEATURES }}

      # Sharded per-crate tests — same rationale as the `check` job.
      - name: Test octos-core
        run: cargo test -p octos-core
      - name: Test octos-memory
        run: cargo test -p octos-memory
      - name: Test octos-llm (lib)
        run: cargo test -p octos-llm --lib
      - name: Test octos-llm (integration)
        run: cargo test -p octos-llm --tests
      - name: Test octos-bus
        run: cargo test -p octos-bus
      - name: Test octos-pipeline
        run: cargo test -p octos-pipeline
      - name: Test octos-plugin
        run: cargo test -p octos-plugin
      - name: Test octos-swarm
        run: cargo test -p octos-swarm
      - name: Test octos-agent (lib)
        run: cargo test -p octos-agent --lib
      - name: Test octos-agent (integration)
        run: cargo test -p octos-agent --tests
      - name: Test octos-cli (lib)
        run: cargo test -p octos-cli --lib
      - name: Test octos-cli (integration)
        run: cargo test -p octos-cli --tests
      - name: Test harness starter skills
        run: |
          cargo test -p harness-starter-generic
          cargo test -p harness-starter-report
          cargo test -p harness-starter-audio
          cargo test -p harness-starter-coding
      - name: Doc tests
        run: cargo test --workspace --doc

  # ── Release artifact builds (main only) ──────────────────────────
  build-macos-arm:
    if: github.event_name == 'push'
    needs: [check, test-octos-agent, test-octos-cli]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/$b" dist/ 2>/dev/null || true
          done
          cd dist && tar czf ../octos-bundle-aarch64-apple-darwin.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: octos-bundle-aarch64-apple-darwin
          path: octos-bundle-aarch64-apple-darwin.tar.gz
          retention-days: 7

  build-linux-x86:
    if: github.event_name == 'push'
    needs: [check, test-octos-agent, test-octos-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/$b" dist/ 2>/dev/null || true
          done
          cd dist && tar czf ../octos-bundle-x86_64-unknown-linux-gnu.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: octos-bundle-x86_64-unknown-linux-gnu
          path: octos-bundle-x86_64-unknown-linux-gnu.tar.gz
          retention-days: 7

  build-linux-arm:
    if: github.event_name == 'push'
    needs: check-arm
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: arm64-release

      - name: Build release
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/$b" dist/ 2>/dev/null || true
          done
          cd dist && tar czf ../octos-bundle-aarch64-unknown-linux-gnu.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: octos-bundle-aarch64-unknown-linux-gnu
          path: octos-bundle-aarch64-unknown-linux-gnu.tar.gz
          retention-days: 7

  build-windows:
    if: github.event_name == 'push'
    needs: check-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release

      - name: Build release
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        shell: bash
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/${b}.exe" dist/ 2>/dev/null || true
          done
          cd dist && 7z a ../octos-bundle-x86_64-pc-windows-msvc.zip *

      - uses: actions/upload-artifact@v7
        with:
          name: octos-bundle-x86_64-pc-windows-msvc
          path: octos-bundle-x86_64-pc-windows-msvc.zip
          retention-days: 7

  e2e-tool-regression:
    runs-on: macos-14
    needs: [check, test-octos-agent, test-octos-cli]
    # Run on pushes to main or when tool/sandbox/agent files change
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'tool') ||
      contains(github.event.pull_request.title, 'sandbox') ||
      contains(github.event.pull_request.title, 'activate')
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check for relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD 2>/dev/null || echo "")
          fi
          if echo "$FILES" | grep -qE '(activate_tools|sandbox|shell\.rs|tools/mod|session_actor|exec_env)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build octos with all features
        if: steps.changes.outputs.run == 'true'
        run: cargo build --release -p octos-cli --features "octos-cli/api,octos-cli/telegram"

      - name: Install Homebrew ffmpeg (macOS)
        if: steps.changes.outputs.run == 'true'
        run: brew install ffmpeg

      - name: Start octos serve
        if: steps.changes.outputs.run == 'true'
        run: |
          OCTOS_AUTH_TOKEN=ci-test-token ./target/release/octos serve --port 3000 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/status -H "Authorization: Bearer ci-test-token" > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install e2e deps
        if: steps.changes.outputs.run == 'true'
        working-directory: e2e
        run: npm install

      - name: Run e2e tool regression tests
        if: steps.changes.outputs.run == 'true'
        working-directory: e2e
        run: OCTOS_TEST_URL=http://localhost:3000 OCTOS_AUTH_TOKEN=ci-test-token npx playwright test --reporter=line

      - name: Stop octos serve
        if: always()
        run: pkill -f "octos serve" || true

  security:
    runs-on: macos-14
    needs: [check, test-octos-agent, test-octos-cli]
    # Only run when security-related files change
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'security') ||
      contains(github.event.pull_request.title, 'sandbox')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check for security-related changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD 2>/dev/null || echo "")
          fi
          if echo "$FILES" | grep -qE '(sandbox|ssrf|security|tools/mod|session_actor|profiles)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Security sandbox tests (macOS kernel enforcement)
        if: steps.changes.outputs.run == 'true'
        run: |
          echo "Running 24 security integration tests on macOS (sandbox-exec SBPL)"
          cargo test -p crew-agent --test security_sandbox -- --nocapture
