name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Dashboard typecheck
        working-directory: dashboard
        run: npm run typecheck

      - name: Dashboard build
        working-directory: dashboard
        run: npm run build

      - name: Verify embedded dashboard assets are up to date
        run: |
          ./scripts/build-dashboard.sh
          if [ -n "$(git status --porcelain -- crates/octos-cli/static/admin)" ]; then
            echo "Embedded dashboard assets are out of date. Run ./scripts/build-dashboard.sh and commit changes."
            git status --short -- crates/octos-cli/static/admin
            exit 1
          fi

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  security:
    runs-on: macos-14
    needs: check
    # Only run when security-related files change
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'security') ||
      contains(github.event.pull_request.title, 'sandbox')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check for security-related changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD 2>/dev/null || echo "")
          fi
          if echo "$FILES" | grep -qE '(sandbox|ssrf|security|tools/mod|session_actor|profiles)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Security sandbox tests (macOS kernel enforcement)
        if: steps.changes.outputs.run == 'true'
        run: |
          echo "Running 24 security integration tests on macOS (sandbox-exec SBPL)"
          cargo test -p crew-agent --test security_sandbox -- --nocapture
