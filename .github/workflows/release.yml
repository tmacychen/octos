  #           ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
  #           ghcr.io/${{ github.repository }}:latest
  #         cache-from: type=gha
  #         cache-to: type=gha,mode=max

  publish:
    needs: [build-macos-arm, build-linux-x86, build-linux-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-arm/octos-bundle-aarch64-apple-darwin.tar.gz
            artifacts/linux-x86/octos-bundle-x86_64-unknown-linux-gnu.tar.gz
            artifacts/linux-arm/octos-bundle-aarch64-unknown-linux-gnu.tar.gz
            artifacts/windows/octos-bundle-x86_64-pc-windows-msvc.zip
            scripts/install.sh
            scripts/install.ps1
            scripts/octos-doctor.sh
          body_path: RELEASE_NOTES.md
