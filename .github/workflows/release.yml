name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all = full release)'
        required: true
        type: choice
        default: all
        options: [all, macos-arm, linux-x86, linux-arm, windows, docker]
      tag:
        description: 'Tag to release (e.g. v0.1.2-rc5). Required for publish.'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FEATURES: "api,telegram,discord,whatsapp,feishu,twilio,wecom,wecom-bot"
  SKILL_CRATES: "-p news_fetch -p deep-search -p deep-crawl -p send-email -p account-manager -p voice -p clock -p weather -p pipeline-guard"

jobs:
  build-macos-arm:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos-arm'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set build metadata
        run: |
          echo "OCTOS_GIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "OCTOS_BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Build
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/$b" dist/ 2>/dev/null || true
          done
          cd dist && tar czf ../octos-bundle-aarch64-apple-darwin.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm
          path: octos-bundle-aarch64-apple-darwin.tar.gz

  build-linux-x86:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux-x86'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set build metadata
        run: |
          echo "OCTOS_GIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "OCTOS_BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Build
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/$b" dist/ 2>/dev/null || true
          done
          cd dist && tar czf ../octos-bundle-x86_64-unknown-linux-gnu.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86
          path: octos-bundle-x86_64-unknown-linux-gnu.tar.gz

  build-linux-arm:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux-arm'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: arm64-release

      - name: Set build metadata
        run: |
          echo "OCTOS_GIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "OCTOS_BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Build
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/$b" dist/ 2>/dev/null || true
          done
          cd dist && tar czf ../octos-bundle-aarch64-unknown-linux-gnu.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm
          path: octos-bundle-aarch64-unknown-linux-gnu.tar.gz

  build-windows:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release

      - name: Set build metadata
        shell: bash
        run: |
          echo "OCTOS_GIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "OCTOS_BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build dashboard
        shell: bash
        run: cd dashboard && npm ci && npm run build

      - name: Build
        run: |
          cargo build --release -p octos-cli --features ${{ env.FEATURES }}
          cargo build --release ${{ env.SKILL_CRATES }}

      - name: Bundle
        shell: bash
        run: |
          mkdir dist
          for b in octos news_fetch deep-search deep_crawl send_email account_manager voice clock weather pipeline-guard; do
            cp "target/release/${b}.exe" dist/ 2>/dev/null || true
          done
          cd dist && 7z a ../octos-bundle-x86_64-pc-windows-msvc.zip *

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: octos-bundle-x86_64-pc-windows-msvc.zip

  # TODO: uncomment after Dockerfile is fixed
  # build-docker:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     packages: write
  #   steps:
  #     - uses: actions/checkout@v6
  #
  #     - uses: docker/setup-qemu-action@v3
  #
  #     - uses: docker/setup-buildx-action@v3
  #
  #     - uses: docker/login-action@v3
  #       with:
  #         registry: ghcr.io
  #         username: ${{ github.actor }}
  #         password: ${{ secrets.GITHUB_TOKEN }}
  #
  #     - name: Extract version
  #       id: meta
  #       run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
  #
  #     - uses: docker/build-push-action@v6
  #       with:
  #         context: .
  #         platforms: linux/amd64,linux/arm64
  #         push: true
  #         tags: |
  #           ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
  #           ghcr.io/${{ github.repository }}:latest
  #         cache-from: type=gha
  #         cache-to: type=gha,mode=max

  publish:
    if: ${{ !failure() && !cancelled() && (github.event_name == 'push' || inputs.tag != '') }}
    needs: [build-macos-arm, build-linux-x86, build-linux-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          # Copy whichever platform bundles were built
          find artifacts -name 'octos-bundle-*' -exec cp {} release-assets/ \;
          # Always include install scripts
          cp scripts/install.sh scripts/install.ps1 scripts/octos-doctor.sh release-assets/
          echo "Assets to upload:"
          ls -la release-assets/

      - name: Detect pre-release
        id: prerelease
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if echo "$TAG" | grep -qE '-(rc|alpha|beta|dev|preview|test|macos|linux|win)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: release-assets/*
          body_path: RELEASE_NOTES.md
