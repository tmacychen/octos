<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>octos Swarm</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%90%9D</text></svg>"
    />
    <style>
      :root {
        --bg: #0b1016;
        --surface: #101823;
        --accent: #7ab4ff;
      }
      html, body { margin: 0; padding: 0; background: var(--bg); color: #e6e8eb; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
      .bg-bg { background-color: var(--bg); }
      .bg-surface { background-color: var(--surface); }
      .text-accent { color: var(--accent); }
      .bg-accent { background-color: var(--accent); }
      .border-accent { border-color: var(--accent); }
    </style>
  </head>
  <body class="bg-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
