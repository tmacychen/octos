[package]
name = "voice"
version = "1.0.0"
edition = "2021"
description = "Voice skill binary (ASR/TTS/model management) using ominix-api on Apple Silicon"
authors = ["hagency"]

[[bin]]
name = "voice"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls", "json", "multipart"], default-features = false }
base64 = "0.22"
