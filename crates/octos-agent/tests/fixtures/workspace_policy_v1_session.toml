# Workspace policy fixture — M4.6 v1 shape for session workspaces (voice /
# podcast path). Exercises the spawn_tasks contract as well.
schema_version = 1

[workspace]
kind = "session"

[version_control]
provider = "git"
auto_init = false
trigger = "turn_end"
fail_on_error = false

[tracking]
ignore = ["tmp/**", ".DS_Store"]

[artifacts]
primary_audio = "*.mp3"
podcast_audio = "**/podcast_full_*.*"
# octos #1040: the image-producing mofa contracts (comic, infographic,
# frame) need a named artifact source so `bind_explicit_files_to_artifacts`
# can bind the plugin-reported PNG into `ActionContext`. The glob mirrors
# the `**/*.png` pattern the MagicBytes(Png) validator uses in glob mode.
image_png = "**/*.png"

[spawn_tasks.fm_tts]
artifact = "primary_audio"
on_verify = [
    "file_exists:$artifact",
    "file_size_min:$artifact:1024",
]
on_failure = ["notify_user:TTS generation failed"]

[spawn_tasks.podcast_generate]
artifact = "podcast_audio"
on_verify = [
    "file_exists:$artifact",
    "file_size_min:$artifact:4096",
]
on_failure = ["notify_user:Podcast generation failed"]
# octos #1034: opt the magic-bytes + audio-non-silent validators into the
# `spawn_only_files` source so the validator consumes the authoritative path
# list the plugin reports via its JSON stdout envelope. Avoids the
# topic-suffixed output directory race (`mofa-podcast-zhuyu/`, etc.) that
# made the legacy hardcoded glob `skill-output/mofa-podcast/**/*.mp3`
# unreliable. The `extension` filter narrows the list to mp3 outputs so
# adjacent intermediate WAVs in `files_to_send` are ignored.
on_completion = [
    { kind = "magic_bytes", source = "spawn_only_files", extension = "mp3", format = "mp3" },
    { kind = "audio_non_silent", source = "spawn_only_files", extension = "mp3", min_ratio = 0.3 },
]

[spawn_tasks.fm_voice_save]
on_completion = [
    { kind = "ominix_voice_exists", name_arg = "name" },
]
on_failure = ["notify_user:Voice registration failed"]

# octos #1036 (follow-up to #1034): mofa_slides now opts into the
# `spawn_only_files` source so the magic-bytes check inspects the exact
# PPTX path the plugin reported instead of any `**/*.pptx` match in the
# session workspace. The `extension = "pptx"` filter narrows the list to
# slide decks if the skill surfaces auxiliary preview files via
# `files_to_send`.
[spawn_tasks.mofa_slides]
on_completion = [
    { kind = "magic_bytes", source = "spawn_only_files", extension = "pptx", format = "pptx" },
]
on_failure = ["notify_user:Slide generation failed"]

# octos #1040 (follow-up to #1035 / #1037): mofa_comic, mofa_infographic,
# and mofa_frame all carry the same MagicBytes(Png) shape on the
# `spawn_only_files` source. The plugin envelopes (or auto-detection via
# `args.out` in `plugins/tool.rs::detect_output_file`) populate
# `files_to_send` directly so the validator inspects the exact PNG the
# skill wrote instead of any `**/*.png` match in the workspace. The
# `extension = "png"` filter narrows the list when the skill surfaces
# auxiliary files (intermediate panel PNGs, layout previews) via
# `files_to_send`.
#
# `mofa_cards` is intentionally NOT in this sweep — the plugin does not
# yet emit `files_to_send` (its required arg is `card_dir`, not `out`,
# and the success text `"Generated N card(s) in <dir>"` does not match
# the `Generated:` / `Generated PPTX:` markers that
# `detect_output_file` auto-detects). A follow-up issue tracks the
# plugin emission fix.
[spawn_tasks.mofa_comic]
artifact = "image_png"
on_completion = [
    { kind = "file_exists", path = "${args.out}", min_bytes = 1024 },
    { kind = "magic_bytes", source = "spawn_only_files", extension = "png", format = "png" },
]
on_failure = ["notify_user:Comic generation failed"]

[spawn_tasks.mofa_infographic]
artifact = "image_png"
on_completion = [
    { kind = "file_exists", path = "${args.out}", min_bytes = 1024 },
    { kind = "magic_bytes", source = "spawn_only_files", extension = "png", format = "png" },
]
on_failure = ["notify_user:Infographic generation failed"]

[spawn_tasks.mofa_frame]
artifact = "image_png"
on_completion = [
    { kind = "magic_bytes", source = "spawn_only_files", extension = "png", format = "png" },
]
on_failure = ["notify_user:Frame extraction failed"]

# octos #1038 (follow-up to #1037): voice_synthesize now opts into the
# `spawn_only_files` source so the audio-non-silent check inspects the
# exact audio path the plugin reported via `files_to_send`. The previous
# `skill-output/voice/**/*.{mp3,wav}` glob could match a stale file from
# an earlier run in the same session workspace and falsely satisfy the
# contract for a freshly-failed call. PR #1037 originally swept this
# contract but the voice half was reverted (772783e7) until the plugin
# learned to emit a marker `PluginTool::detect_output_file` recognises —
# fixed in PR #1039. No `extension` filter: the voice plugin always
# emits exactly one audio path per call (.mp3 when ffmpeg is available,
# otherwise .wav fallback from the macOS Say path), and the validator
# decodes either format.
[spawn_tasks.voice_synthesize]
on_completion = [
    { kind = "audio_non_silent", source = "spawn_only_files", min_ratio = 0.3 },
]
on_failure = ["notify_user:Voice synthesis failed"]

# Wave-3a: HttpProbeUntil + Sha256Match + soft_fail are operator-visible
# TOML shapes; this fixture also acts as a syntax demo for operators.

[spawn_tasks.manage_skills]
on_completion = [
    { kind = "sha256_match", glob = "${args.skill_dir}/main", sha256 = "${args.expected_sha256}" },
]
on_failure = ["notify_user:Skill install verification failed"]

[[spawn_tasks.deep_search.on_completion]]
id = "deep_search.primary_index"
required = true
kind = "file_exists"
path = "${args.research_dir}/_search_results.md"

[[spawn_tasks.deep_search.on_completion]]
id = "deep_search.sources_warn"
required = true
soft_fail = true
kind = "file_exists"
path = "${args.research_dir}/01_source.md"

[[spawn_tasks.deep_search.on_completion]]
id = "deep_search.async_ready_probe"
kind = "http_probe_until"
url_template = "http://127.0.0.1:8081/v1/jobs/${args.job_id}"
expected_contains = "complete"
poll_interval_ms = 1000
deadline_ms = 20000
