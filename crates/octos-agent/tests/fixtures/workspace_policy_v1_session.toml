# Workspace policy fixture — M4.6 v1 shape for session workspaces (voice /
# podcast path). Exercises the spawn_tasks contract as well.
schema_version = 1

[workspace]
kind = "session"

[version_control]
provider = "git"
auto_init = false
trigger = "turn_end"
fail_on_error = false

[tracking]
ignore = ["tmp/**", ".DS_Store"]

[artifacts]
primary_audio = "*.mp3"
podcast_audio = "**/podcast_full_*.*"

[spawn_tasks.fm_tts]
artifact = "primary_audio"
on_verify = [
    "file_exists:$artifact",
    "file_size_min:$artifact:1024",
]
on_failure = ["notify_user:TTS generation failed"]

[spawn_tasks.podcast_generate]
artifact = "podcast_audio"
on_verify = [
    "file_exists:$artifact",
    "file_size_min:$artifact:4096",
]
on_failure = ["notify_user:Podcast generation failed"]
# octos #1034: opt the magic-bytes + audio-non-silent validators into the
# `spawn_only_files` source so the validator consumes the authoritative path
# list the plugin reports via its JSON stdout envelope. Avoids the
# topic-suffixed output directory race (`mofa-podcast-zhuyu/`, etc.) that
# made the legacy hardcoded glob `skill-output/mofa-podcast/**/*.mp3`
# unreliable. The `extension` filter narrows the list to mp3 outputs so
# adjacent intermediate WAVs in `files_to_send` are ignored.
on_completion = [
    { kind = "magic_bytes", source = "spawn_only_files", extension = "mp3", format = "mp3" },
    { kind = "audio_non_silent", source = "spawn_only_files", extension = "mp3", min_ratio = 0.3 },
]

[spawn_tasks.fm_voice_save]
on_completion = [
    { kind = "ominix_voice_exists", name_arg = "name" },
]
on_failure = ["notify_user:Voice registration failed"]

# octos #1036 (follow-up to #1034): mofa_slides now opts into the
# `spawn_only_files` source so the magic-bytes check inspects the exact
# PPTX path the plugin reported instead of any `**/*.pptx` match in the
# session workspace. The `extension = "pptx"` filter narrows the list to
# slide decks if the skill surfaces auxiliary preview files via
# `files_to_send`.
#
# `voice_synthesize` was originally part of this sweep but was reverted
# after codex review caught that the voice plugin's `succeed()` path
# emits only `{output, success}` (no `files_to_send`) and its success
# text `"Generated audio: <path>"` is not one of the prefixes
# `PluginTool::detect_output_file` recognises. A follow-up issue tracks
# the plugin emission fix.
[spawn_tasks.mofa_slides]
on_completion = [
    { kind = "magic_bytes", source = "spawn_only_files", extension = "pptx", format = "pptx" },
]
on_failure = ["notify_user:Slide generation failed"]

# Wave-3a: HttpProbeUntil + Sha256Match + soft_fail are operator-visible
# TOML shapes; this fixture also acts as a syntax demo for operators.

[spawn_tasks.manage_skills]
on_completion = [
    { kind = "sha256_match", glob = "${args.skill_dir}/main", sha256 = "${args.expected_sha256}" },
]
on_failure = ["notify_user:Skill install verification failed"]

[[spawn_tasks.deep_search.on_completion]]
id = "deep_search.primary_index"
required = true
kind = "file_exists"
path = "${args.research_dir}/_search_results.md"

[[spawn_tasks.deep_search.on_completion]]
id = "deep_search.sources_warn"
required = true
soft_fail = true
kind = "file_exists"
path = "${args.research_dir}/01_source.md"

[[spawn_tasks.deep_search.on_completion]]
id = "deep_search.async_ready_probe"
kind = "http_probe_until"
url_template = "http://127.0.0.1:8081/v1/jobs/${args.job_id}"
expected_contains = "complete"
poll_interval_ms = 1000
deadline_ms = 20000
