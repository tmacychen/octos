[[scenario]]
id = "restart-reconnect"
title = "Restart + reconnect"
description = "Backend restarts mid-session; the TUI reconnects, prior session state is preserved, no duplicate prompts are issued."
tier = "release"
transport = "ws"
provider = "fixture"
terminal = "100x30"
tui_binary = "octos-tui"
tmux_command = "ux-tui-restart-reconnect"
required_tools = ["tmux", "octos", "octos-tui"]
required_capabilities = ["session/resume", "session/snapshot", "session/hydrate", "protocol/replay_lossy", "transport/reconnect"]
expected_artifacts = [
  "scenario.json",
  "summary.json",
  "launch-command.txt",
  "terminal-size.json",
  "input-replay.log",
  "appui-transcript.jsonl",
  "server.log",
  "tui-capture.txt",
  "runtime-policy-stamp.json",
  "validation.json",
  "reconnect-events.jsonl",
  "tui-capture-pre-restart.txt",
  "tui-capture-post-reconnect.txt",
  "pre-restart-snapshot.json",
  "post-reconnect-snapshot.json",
  "websocket-transcript.jsonl",
  "server-before-restart.log",
  "server-pane-after-restart.txt",
]
acceptance = [
  "appui.no_duplicate_prompt_after_reconnect",
  "appui.session_state_preserved",
  "restart_reconnect_visible_contract",
]
notes = "Uses the current octos-tui onboarding runner over WebSocket, restarts the real backend tmux server under the live TUI, then captures TUI reconnect state plus session/hydrate pre/post snapshots."

