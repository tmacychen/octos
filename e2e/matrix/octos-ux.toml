description = "Boot without a configured provider; UX should surface a recoverable banner, not crash, and validators should see a typed error in appui-transcript."
tier = "fast"
transport = "stdio"
provider = "none"
terminal = "80x24"
tui_binary = "octos-tui"
tmux_command = "ux-tui-provider-missing"
required_tools = ["tmux", "octos", "octos-tui"]
required_capabilities = ["onboarding/workspace_probe"]
expected_artifacts = [
  "scenario.json",
  "summary.json",
  "launch-command.txt",
  "terminal-size.json",
  "input-replay.log",
  "appui-transcript.jsonl",
  "server.log",
  "tui-capture.txt",
  "runtime-policy-stamp.json",
  "validation.json",
  "tui-capture-provider-missing.txt",
]
acceptance = [
  "appui.provider_missing_banner_present",
  "appui.no_panic",
  "tui.first_frame_not_blank",
  "provider_missing_visible_contract",
]
notes = "Uses the current octos-tui onboarding runner with no profile LLM to open /provider and preserve the recoverable provider setup capture."

