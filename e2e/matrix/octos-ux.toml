required_capabilities = ["approval/request", "approval/deny"]
expected_artifacts = [
  "scenario.json",
  "summary.json",
  "launch-command.txt",
  "terminal-size.json",
  "input-replay.log",
  "appui-transcript.jsonl",
  "server.log",
  "tui-capture.txt",
  "runtime-policy-stamp.json",
  "validation.json",
