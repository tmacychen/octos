[default]
extend-ignore-identifiers-re = [
    # *sigh* this just isn't worth the cost of fixing
    "AttributeID.*Supress.*",
]

[default.extend-identifiers]
# *sigh* this just isn't worth the cost of fixing
AttributeIDSupressMenu = "AttributeIDSupressMenu"

[default.extend-words]
# Intentional typo fixture in mcp.rs / m8_integration_concurrency.rs:
# both tests assert that the parser correctly REJECTS "exlusive" as
# an invalid concurrency_class value. Allowlist the misspelling so
# the typos lint doesn't flag the negative-test JSON literal.
exlusive = "exlusive"
# Don't correct the surname "Teh"
teh = "teh"
Hashi = "Hashi"
consts = "consts"
# Voice preset name (ono_anna)
ono = "ono"
# WeChat API event name
scaned = "scaned"
# Timezone abbreviation (IST)
ist = "ist"
# Test data fragment in SSE test
hel = "hel"
# Homoglyph security test string
nore = "nore"
# WhatsApp API field name
pn = "pn"
# Both spellings are acceptable
unparseable = "unparseable"
# Base64 placeholder token
iz = "iz"
# One-Time Passwords (OTPs)
ot = "ot"
# Rust TUI library name
ratatui = "ratatui"
# English prefix "mis-" (misclassification, miscount, etc.)
mis = "mis"
# Constant-time equality test fixture (intentionally 1-byte diff from "abc")
abd = "abd"

[files]
extend-exclude = ["**/*.js", "**/*.css", "**/*.html", "examples/*/static/**/*.*"]