services:
  # ─────────────────────────────────────────────
  # octos Chat (one-shot query)
  #   docker compose --profile agent run --rm octos-agent -m "Hello"
  # ─────────────────────────────────────────────
  octos-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: octos-agent
    profiles:
      - agent
    volumes:
      - ./.octos/config.json:/root/.octos/config.json:ro
      - octos-workspace:/root/.octos
    entrypoint: ["octos", "chat"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # octos Gateway (long-running bot)
  #   docker compose --profile gateway up -d
  # ─────────────────────────────────────────────
  octos-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: octos-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      - ./.octos/config.json:/root/.octos/config.json:ro
      - octos-workspace:/root/.octos
    command: ["gateway"]

volumes:
  octos-workspace:
